<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 220" role="img" aria-labelledby="title desc">
  <title id="title">Tomato Leaf Disease Detector</title>
  <desc id="desc">Animated banner with gradient and leaf motif</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f766e">
        <animate attributeName="stop-color" values="#0f766e;#15803d;#166534;#15803d;#0f766e" dur="10s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#22c55e">
        <animate attributeName="stop-color" values="#22c55e;#84cc16;#22c55e;#4ade80;#22c55e" dur="8s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#14532d">
        <animate attributeName="stop-color" values="#14532d;#0f766e;#14532d;#166534;#14532d" dur="12s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="920" height="220" rx="18" fill="url(#bg)"/>
  <g opacity="0.35" fill="#ecfccb">
    <ellipse cx="120" cy="160" rx="90" ry="40" transform="rotate(-25 120 160)"/>
    <ellipse cx="800" cy="50" rx="70" ry="28" transform="rotate(15 800 50)"/>
  </g>
  <text x="460" y="95" text-anchor="middle" fill="#f0fdf4" font-size="38" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif" font-weight="700" filter="url(#glow)">Tomato Leaf Disease Detector</text>
  <text x="460" y="138" text-anchor="middle" fill="#dcfce7" font-size="17" font-family="ui-sans-serif,system-ui,-apple-system,Segoe UI,sans-serif" opacity="0.95">ONNX · Flask · Grad-CAM style heatmaps · SQLite history</text>
  <circle cx="460" cy="185" r="4" fill="#fef08a">
    <animate attributeName="opacity" values="0.4;1;0.4" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="440" cy="185" r="4" fill="#fef08a">
    <animate attributeName="opacity" values="1;0.4;1" dur="1.8s" repeatCount="indefinite"/>
  </circle>
  <circle cx="480" cy="185" r="4" fill="#fef08a">
    <animate attributeName="opacity" values="0.7;0.3;0.7" dur="1.8s" repeatCount="indefinite"/>
  </circle>
</svg>
