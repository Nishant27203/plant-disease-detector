{% extends "base.html" %}

{% block title %}Error{% endblock %}

{% block content %}
<section class="page-wrap">
  <div class="error-card">
    <p class="eyebrow">Error {{ status_code or 500 }}</p>
    <h1>We could not complete that request.</h1>
    <p>{{ message or "Something went wrong. Please try again." }}</p>
    <a class="button primary compact" href="/">Back to Detection</a>
  </div>
</section>
{% endblock %}
